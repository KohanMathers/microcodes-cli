name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      should_release: ${{ steps.parse.outputs.should_release }}
    steps:
      - name: Parse commit message
        id: parse
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [[ "$MSG" =~ \[([0-9]+\.[0-9]+\.[0-9]+)\] ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Found version: $VERSION"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No version tag in commit message"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: microcodes-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: microcodes-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: microcodes-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: microcodes-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: microcodes-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/microcodes ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/microcodes.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          # Find the previous release commit (one containing [x.y.z] pattern)
          PREV_COMMIT=$(git log --format="%H %s" HEAD~1..HEAD | head -1 || true)
          PREV_TAG_COMMIT=$(git log --format="%H %s" HEAD~1 | grep -E '\[[0-9]+\.[0-9]+\.[0-9]+\]' | head -1 | awk '{print $1}' || true)

          if [ -z "$PREV_TAG_COMMIT" ]; then
            # No previous version commit — go back to root
            RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD~1"
          else
            RANGE="${PREV_TAG_COMMIT}..HEAD~1"
          fi

          # Include the current commit message (stripped of [version]) as the first entry
          CURRENT_MSG=$(git log -1 --format="%s" | sed 's/ \[[0-9]*\.[0-9]*\.[0-9]*\]//')
          RANGE_NOTES=$(git log "$RANGE" --format="- %s" --reverse 2>/dev/null || true)

          if [ -n "$RANGE_NOTES" ]; then
            NOTES="${RANGE_NOTES}
- ${CURRENT_MSG}"
          else
            NOTES="- ${CURRENT_MSG}"
          fi

          # Write notes to a file (avoids multiline env var issues)
          {
            echo "## What's Changed"
            echo ""
            echo "$NOTES"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/commits/v${VERSION}"
          } > release_notes.md

          cat release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release_notes.md \
            artifacts/**/*
